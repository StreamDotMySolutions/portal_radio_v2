
# redirect rtm.gov.my to www.rtm.gov.my
# 1. Redirect HTTP (port 80) to HTTPS (port 443), and non-www to www
server {
    listen 80;
    server_name rtm.gov.my www.rtm.gov.my;

    return 301 https://www.rtm.gov.my$request_uri;
}

# 2. Redirect non-www HTTPS to www HTTPS
server {
    listen 443 ssl;
    server_name rtm.gov.my;


    ssl_certificate /etc/nginx/certs/FullChain.pem;
    ssl_certificate_key /etc/nginx/keys/private.key;

    return 301 https://www.rtm.gov.my$request_uri;
}


server {
    server_name www.rtm.gov.my;

    root /var/www/rtm_portal_v2/rtm.gov.my/build;

    # frontend
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ftp uploaded images
    location /images {
        autoindex off;  # Optional, enables directory listing if needed
        client_max_body_size 256M;
        alias /var/www/rtm_portal/images/;
        index index.html;
        try_files  $uri $uri/ /admin/index.html;
    }

    # web administration
    #location /backend {
    #       index index.html;
    #       alias /var/www/rtm_portal_v2/backend/build;
    #       try_files $uri $uri/ /backend/index.html;
    #}


    # storage stored in Laravel
    location /storage {
           alias /var/www/rtm_portal_v2/api/storage/app/public/;
           index index.html;
           autoindex off;  # Optional, enables directory listing if needed
    }

    # laravel API server
    location /api {
         client_max_body_size 256M;
         alias /var/www/rtm_portal_v2/api/public;
         index index.php;
         try_files $uri $uri/ @laravelapi;

         # pass PHP scripts to FastCGI server
         location ~ \.php$ {
             include snippets/fastcgi-php.conf;
             #fastcgi_pass unix:/run/php/php8.1-fpm.sock;
             fastcgi_pass unix:/run/php/php8.2-fpm.sock;
             include fastcgi_params;
             fastcgi_read_timeout 600;
             fastcgi_param SCRIPT_FILENAME $request_filename;
             fastcgi_param SCRIPT_NAME /api$fastcgi_script_name;
      }
    }

    # laravel API rewrite
    location @laravelapi {
        rewrite /api/(.*)?$ /api/index.php?$is_args$args last;
    }

    # SSL
    listen 443 ssl; # managed by StreamDotMy.com
    server_name  rtm.gov.my;
    #ssl_certificate  /etc/letsencrypt/live/official/CombinedCertificate.pem;
    #ssl_certificate_key  /etc/letsencrypt/live/official/RTM_CSR_FILE.key;
    ssl_certificate /etc/nginx/certs/FullChain.pem;
    ssl_certificate_key /etc/nginx/keys/private.key;

    ssl_session_cache    shared:SSL:1m;
    ssl_session_timeout  5m;
    ssl_ciphers  HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers  on;
    ssl_protocols TLSv1.2 TLSv1.3; 

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Content-Security-Policy "frame-ancestors 'none';" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), fullscreen=(self), payment=(), usb=()" always;



   add_header Content-Security-Policy "
       default-src 'self';
       script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://cdn.jsdelivr.net;
       connect-src 'self' https://www.google-analytics.com https://www.rtm.gov.my blob:;
       style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://fonts.googleapis.com https://cdn.jsdelivr.net;
       font-src 'self' https://cdnjs.cloudflare.com https://fonts.gstatic.com https://cdn.jsdelivr.net;
       img-src 'self' data:;
       media-src 'self' https://www.rtm.gov.my blob:;
       object-src 'none';
       base-uri 'self';
       frame-ancestors 'self' https://developer.mozilla.org;" always;
}




# redirect http to https
server {
    if ($host = www.rtm.gov.my) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name www.rtm.gov.my;
    return 404; # managed by Certbot
}

